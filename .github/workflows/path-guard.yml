name: path-guard

# Fails any external PR that touches maintainer-only paths (CONTRIBUTING.md
# "Ownership zones"). Uses only the read-only API token — safe on fork PRs,
# no checkout of untrusted code.

on:
  pull_request:

permissions:
  pull-requests: read

jobs:
  guard:
    # TEMPORARY (revert to `!=`): inverted so the guard actually RUNS on the
    # maintainer's own PRs, to verify it works. It has never executed once.
    if: github.event.pull_request.user.login == 'dripsmvcp'
    runs-on: ubuntu-latest
    steps:
      - name: Check maintainer-only paths
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh api "repos/$REPO/pulls/$PR/files" --paginate -q '.[].filename' > changed.txt
          # reasonmetrics.toml is in here because it carries [scoring.weights]:
          # weights are scoring semantics, and those never move without
          # calibration evidence (docs/CALIBRATION.md). Without it, the one
          # change the policy most wants to stop could sail through green CI.
          PROTECTED='^(crates/reasonmetrics-core/|crates/reasonmetrics-wasm/src/|\.github/|Cargo\.toml$|reasonmetrics\.toml$|docs/launch\.md$)'
          if grep -E "$PROTECTED" changed.txt; then
            echo "::error::This PR modifies maintainer-only paths (see the Ownership zones section of CONTRIBUTING.md). Please open an issue to discuss the change instead."
            exit 1
          fi
          echo "No maintainer-only paths touched."
