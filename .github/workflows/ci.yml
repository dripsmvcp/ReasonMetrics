name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets
      - name: Tests
        run: cargo test --workspace

  wasm-check:
    name: Core compiles for wasm32
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Check no-default-features on wasm32
        run: cargo check -p reasonmetrics-core --no-default-features --target wasm32-unknown-unknown

  wasm-build:
    name: wasm-pack build & node tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: npm install -g wasm-pack@0.13.1
      - name: Node tests under wasm
        run: wasm-pack test --node crates/reasonmetrics-wasm
      - name: Build web package
        run: wasm-pack build crates/reasonmetrics-wasm --target web

  web:
    name: Web app tests & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install wasm-pack
        run: npm install -g wasm-pack@0.13.1
      - name: Install web dependencies
        run: npm ci
        working-directory: web
      - name: Tests (pretest builds the wasm pkg)
        run: npm test
        working-directory: web
      - name: Production build
        run: npm run build
        working-directory: web
